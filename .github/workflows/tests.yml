name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sqlite-tests:
    name: SQLite Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: dom, intl, mbstring, pdo_sqlite, sqlite3, xml, xmlreader, xmlwriter

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare SQLite directory
        run: mkdir -p storage/database

      - name: Run smoke test
        env:
          DB_DRIVER: sqlite
          DB_SQLITE_PATH: storage/database/quenza_ci.sqlite
        run: composer smoke

      - name: Run PHPUnit
        env:
          DB_DRIVER: sqlite
          DB_SQLITE_PATH: storage/database/quenza_ci.sqlite
        run: composer test

  e2e-playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs:
      - sqlite-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: dom, intl, mbstring, pdo_sqlite, sqlite3, xml, xmlreader, xmlwriter

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Prepare runtime directories
        run: mkdir -p storage/database storage/logs

      - name: Start PHP server
        run: |
          php -S 127.0.0.1:8000 -t public > /tmp/quenza-e2e-php-server.log 2>&1 &
          echo $! > /tmp/quenza-e2e-php-server.pid

      - name: Wait for server readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/install > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in time."
          exit 1

      - name: Run Playwright E2E
        env:
          PLAYWRIGHT_USE_EXTERNAL_SERVER: '1'
        run: npm run e2e

      - name: Stop PHP server
        if: always()
        run: |
          if [ -f /tmp/quenza-e2e-php-server.pid ]; then
            kill "$(cat /tmp/quenza-e2e-php-server.pid)" || true
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore

      - name: Upload PHP server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-server-log
          path: /tmp/quenza-e2e-php-server.log
          if-no-files-found: ignore

  mysql-tests:
    name: MySQL Regression Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quenza_test
          MYSQL_USER: quenza
          MYSQL_PASSWORD: quenza_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: dom, intl, mbstring, mysqli, pdo_mysql, xml, xmlreader, xmlwriter

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Wait for MySQL
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: quenza_test
          DB_USERNAME: quenza
          DB_PASSWORD: quenza_secret
        run: |
          php -r '$attempts = 30; while ($attempts-- > 0) { try { new PDO("mysql:host=" . getenv("DB_HOST") . ";port=" . getenv("DB_PORT") . ";dbname=" . getenv("DB_DATABASE") . ";charset=utf8mb4", getenv("DB_USERNAME"), getenv("DB_PASSWORD")); exit(0); } catch (Throwable $e) { sleep(2); } } fwrite(STDERR, "MySQL is not ready\n"); exit(1);'

      - name: Run smoke test
        env:
          DB_DRIVER: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: quenza_test
          DB_USERNAME: quenza
          DB_PASSWORD: quenza_secret
          DB_CHARSET: utf8mb4
        run: composer smoke

      - name: Run PHPUnit
        env:
          DB_DRIVER: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: quenza_test
          DB_USERNAME: quenza
          DB_PASSWORD: quenza_secret
          DB_CHARSET: utf8mb4
        run: composer test
