name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  sqlite-tests:
    name: SQLite Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: dom, intl, mbstring, pdo_sqlite, sqlite3, xml, xmlreader, xmlwriter

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare SQLite directory
        run: mkdir -p storage/database

      - name: Run smoke test
        env:
          DB_DRIVER: sqlite
          DB_SQLITE_PATH: storage/database/quenza_ci.sqlite
        run: composer smoke

      - name: Run PHPUnit
        env:
          DB_DRIVER: sqlite
          DB_SQLITE_PATH: storage/database/quenza_ci.sqlite
        run: composer test

  mysql-tests:
    name: MySQL Regression Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: quenza_test
          MYSQL_USER: quenza
          MYSQL_PASSWORD: quenza_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2
          extensions: dom, intl, mbstring, mysqli, pdo_mysql, xml, xmlreader, xmlwriter

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Wait for MySQL
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: quenza_test
          DB_USERNAME: quenza
          DB_PASSWORD: quenza_secret
        run: |
          php -r '$attempts = 30; while ($attempts-- > 0) { try { new PDO("mysql:host=" . getenv("DB_HOST") . ";port=" . getenv("DB_PORT") . ";dbname=" . getenv("DB_DATABASE") . ";charset=utf8mb4", getenv("DB_USERNAME"), getenv("DB_PASSWORD")); exit(0); } catch (Throwable $e) { sleep(2); } } fwrite(STDERR, "MySQL is not ready\n"); exit(1);'

      - name: Run smoke test
        env:
          DB_DRIVER: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: quenza_test
          DB_USERNAME: quenza
          DB_PASSWORD: quenza_secret
          DB_CHARSET: utf8mb4
        run: composer smoke

      - name: Run PHPUnit
        env:
          DB_DRIVER: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: quenza_test
          DB_USERNAME: quenza
          DB_PASSWORD: quenza_secret
          DB_CHARSET: utf8mb4
        run: composer test
