services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER_NAME:-quenza-cms-app}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: ${APP_NAME:-Quenza CMS}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      QZ_RUNTIME: ${QZ_RUNTIME:-auto}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Jakarta}
      APP_LOCALE: ${APP_LOCALE:-id}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      SESSION_NAME: ${SESSION_NAME:-QUENZASESSID}
      DB_DRIVER: ${DB_DRIVER:-sqlite}
      DB_SQLITE_PATH: ${DB_SQLITE_PATH:-/var/www/html/storage/database/quenza.db}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-quenza_cms}
      DB_USERNAME: ${DB_USERNAME:-quenza}
      DB_PASSWORD: ${DB_PASSWORD:-quenza_secret}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      DB_PREFIX: ${DB_PREFIX:-qz_}
      QZ_PUBLIC_SCHEME: ${QZ_PUBLIC_SCHEME:-http}
      QZ_PUBLIC_HOST: ${QZ_PUBLIC_HOST:-localhost}
      QZ_DOCKER_APP_PUBLIC_PORT: ${QZ_DOCKER_APP_PUBLIC_PORT:-8080}
      QZ_DOCKER_APP_INTERNAL_PORT: ${QZ_DOCKER_APP_INTERNAL_PORT:-80}
      QZ_DOCKER_DB_PUBLISHED_PORT: ${QZ_DOCKER_DB_PUBLISHED_PORT:-3306}
      QZ_ACTIVE_THEME: ${QZ_ACTIVE_THEME:-quenza_default}
      QZ_ADMIN_NAME: ${QZ_ADMIN_NAME:-}
      QZ_ADMIN_USERNAME: ${QZ_ADMIN_USERNAME:-}
      QZ_ADMIN_EMAIL: ${QZ_ADMIN_EMAIL:-}
      QZ_ADMIN_PASSWORD: ${QZ_ADMIN_PASSWORD:-}
    volumes:
      - ./:/var/www/html
      - quenza_cms_vendor:/var/www/html/vendor
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quenza_cms_network

  db:
    image: mysql:8.4
    profiles:
      - mysql
    container_name: ${DB_CONTAINER_NAME:-quenza-cms-db}
    restart: unless-stopped
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-quenza_root_change_me}
      MYSQL_DATABASE: ${DB_DATABASE:-quenza_cms}
      MYSQL_USER: ${DB_USERNAME:-quenza}
      MYSQL_PASSWORD: ${DB_PASSWORD:-quenza_secret}
      MYSQL_TCP_PORT: 3306
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve
      - --default-time-zone=+07:00
      - --sql-mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_ENGINE_SUBSTITUTION
    volumes:
      - quenza_cms_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - quenza_cms_network

volumes:
  quenza_cms_db_data:
  quenza_cms_vendor:

networks:
  quenza_cms_network:
    driver: bridge
